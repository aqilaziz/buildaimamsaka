# GitHub Actions: Supabase Keepalive
# Mencegah Supabase Free Tier auto-pause (setiap 6 hari)
name: Supabase Keepalive

on:
  schedule:
    - cron: "0 0 */6 * *" # Setiap 6 hari
  workflow_dispatch: # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/profiles?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}")

          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Supabase keepalive ping successful (HTTP $RESPONSE)"
          else
            echo "⚠️ Supabase ping returned HTTP $RESPONSE"
          fi

      - name: Ping Vercel Cron (optional fallback)
        run: |
          curl -s -X GET "${{ secrets.VERCEL_URL }}/api/cron/keepalive" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" || true
